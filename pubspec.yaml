name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  supabase_flutter: ^2.5.6
  flutter_dotenv: ^5.1.0
  image_picker: ^1.2.1
  google_fonts: ^6.2.1
  qr_flutter: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#177A47"
  adaptive_icon_foreground: "assets/logo.png"
  web:
    generate: false

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/menu_images/